plugins {
    id 'java-library'
    id 'net.neoforged.gradle.userdev' version '7.0.165'
}

group = 'com.unsa.gs'
version = '1.0.0'
base {
    archivesName = 'GlobalStore'
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

repositories {
    mavenCentral()
}

dependencies {
    implementation "net.neoforged:neoforge:21.1.0"
}
